name: Live

on:
  push:
    branches: [main]
  pull_request:

jobs:
  effect-spacetimedb-live:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: ./.github/actions/setup-spacetimedb
      - run: bun install
      - run: bun --cwd=packages/effect-spacetimedb run codegen:check
      - run: bun --cwd=packages/effect-spacetimedb run test:live
